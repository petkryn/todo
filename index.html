<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="todo_add-container">
      <input type="text" class="todo_add-input" />
      <input type="date" class="todo_add-date" />
      <button class="todo_add-btn">Add todo</button>
    </div>
    <div class="modal hidden">
      <div class="modal-content">
        <h3>Edit task</h3>

        <input type="text" class="modal-input" />
        <input type="date" class="modal-date" />

        <div class="modal-buttons">
          <button class="save-btn">Save</button>
          <button class="cancel-btn">Cancel</button>
        </div>
      </div>
    </div>
    <div class="todo_container"></div>
    <script src="script.js"></script>
  </body>
</html>
